# EU AI Act Article 9 - Risk management system
# Crosswalk to ISO/IEC 42001 Annex A, NIST AI RMF 1.0, OWASP LLM Top 10 (2025).
# Every mapping carries its rationale: no rationale, no link.

article: "9"
title: "Risk management system"
regime: high_risk_annex_iii   # default; classifier may switch to annex_i
summary: >
  A continuous, iterative, documented risk management system running across
  the entire lifecycle of a high-risk AI system: identify, estimate and
  evaluate risks to health, safety and fundamental rights; adopt targeted
  mitigation measures; test against defined metrics; pay specific attention
  to vulnerable groups.

obligations:
  - id: "art9.1-2"
    clause: "Art 9(1)-(2)"
    severity: high
    text: >
      Establish, implement, document and maintain a risk management system as
      a continuous iterative process planned and run throughout the entire
      lifecycle, with regular systematic review and updating.
    evidence_keys: [rms_established, rms_lifecycle_reviews]
    mappings:
      iso42001:
        - ref: "A.5.2"
          rationale: >
            A.5.2 requires a defined AI system impact assessment process; the
            documented, repeatable process it demands is the ISO-side skeleton
            of the Art 9 risk management system.
        - ref: "Clause 6.1 / 8"
          rationale: >
            ISO 42001 clause 6.1 (actions to address risks and opportunities)
            and clause 8 (operational planning) supply the continuous
            plan-do-check-act cycle Art 9(2) demands; Annex A controls hang
            off this management-system loop.
      nist_ai_rmf:
        - ref: "GOVERN 1.4"
          rationale: >
            GOVERN 1.4 requires the risk management process and its outcomes
            to be established through transparent, documented policies and
            procedures - the "establish, document, maintain" half of Art 9(1).
        - ref: "GOVERN 1.5"
          rationale: >
            GOVERN 1.5 requires ongoing monitoring and periodic review of the
            risk management process - the "continuous iterative, regularly
            reviewed" half of Art 9(2).
      owasp_llm: []

  - id: "art9.2a"
    clause: "Art 9(2)(a)"
    severity: high
    text: >
      Identify and analyse the known and reasonably foreseeable risks the
      system can pose to health, safety or fundamental rights when used in
      accordance with its intended purpose.
    evidence_keys: [risk_identification]
    mappings:
      iso42001:
        - ref: "A.5.4"
          rationale: >
            A.5.4 requires assessing AI system impacts on individuals and
            groups - the fundamental-rights-facing risk identification Art
            9(2)(a) demands, at the same per-system granularity.
      nist_ai_rmf:
        - ref: "MAP 5.1"
          rationale: >
            MAP 5.1 requires characterising the likelihood and magnitude of
            each identified impact, based on intended use - the direct RMF
            expression of "identify and analyse known and foreseeable risks".
        - ref: "MAP 1.1"
          rationale: >
            MAP 1.1 establishes intended purpose and context of use; Art
            9(2)(a) risks are defined relative to that intended purpose, so
            risk identification is only meaningful once MAP 1.1 is done.
      owasp_llm:
        - ref: "LLM01-LLM10"
          when: llm_based
          rationale: >
            For LLM-based systems the OWASP Top 10 (2025) is the de-facto
            threat catalogue; an Art 9(2)(a) risk identification for an LLM
            system that has not considered prompt injection (LLM01), supply
            chain (LLM03) or data poisoning (LLM04) is not credible as
            "known and reasonably foreseeable risks".

  - id: "art9.2b"
    clause: "Art 9(2)(b)"
    severity: high
    text: >
      Estimate and evaluate the risks that may emerge when the system is used
      in accordance with its intended purpose AND under conditions of
      reasonably foreseeable misuse.
    evidence_keys: [misuse_analysis]
    mappings:
      iso42001:
        - ref: "A.5.4"
          rationale: >
            Impact assessment on individuals/groups under A.5.4 must cover
            misuse scenarios to satisfy Art 9(2)(b); ISO 42001 has no separate
            misuse control, so this control carries the mapping.
      nist_ai_rmf:
        - ref: "MAP 5.1"
          rationale: >
            MAP 5.1 explicitly includes impacts arising from misuse and
            out-of-scope use in its likelihood/magnitude characterisation -
            the closest one-to-one match in the whole crosswalk.
      owasp_llm:
        - ref: "LLM06"
          when: llm_based
          rationale: >
            Excessive Agency (LLM06) is the canonical LLM misuse-amplifier:
            over-permissioned LLM components turn foreseeable misuse into
            real-world actions, so misuse analysis must cover agency scope.

  - id: "art9.2c"
    clause: "Art 9(2)(c)"
    severity: medium
    text: >
      Evaluate other possibly arising risks based on data gathered from the
      post-market monitoring system referred to in Article 72.
    evidence_keys: [post_market_feedback_loop]
    mappings:
      iso42001:
        - ref: "A.6.2.6"
          rationale: >
            A.6.2.6 (operation and monitoring) requires monitoring the AI
            system in operation; its outputs are the data feed Art 9(2)(c)
            requires the risk process to consume.
        - ref: "A.8.3"
          rationale: >
            A.8.3 (external reporting) gives interested parties a channel to
            report adverse impacts - a required source of post-market signal.
      nist_ai_rmf:
        - ref: "MANAGE 4.1"
          rationale: >
            MANAGE 4.1 requires post-deployment monitoring plans including
            mechanisms to capture and evaluate input from users and affected
            communities - the RMF's post-market monitoring loop.
      owasp_llm: []

  - id: "art9.2d-5"
    clause: "Art 9(2)(d), 9(5)"
    severity: high
    text: >
      Adopt appropriate and targeted risk management measures such that
      residual risk is judged acceptable: eliminate or reduce risks through
      design and development; mitigate and control risks that cannot be
      eliminated; provide information and, where appropriate, training to
      deployers.
    evidence_keys: [risk_treatment_measures, residual_risk_acceptance, deployer_information]
    mappings:
      iso42001:
        - ref: "A.6.1.3"
          rationale: >
            A.6.1.3 (processes for responsible AI design and development)
            is where "eliminate or reduce through design" lives in ISO 42001.
        - ref: "A.8.2"
          rationale: >
            A.8.2 (system documentation and information for users) implements
            Art 9(5)(c): residual risks you cannot engineer away must be
            communicated to deployers.
      nist_ai_rmf:
        - ref: "MANAGE 1.3"
          rationale: >
            MANAGE 1.3 requires documented responses (mitigate, transfer,
            avoid, accept) to high-priority risks - the treatment step Art
            9(2)(d) mandates.
        - ref: "MANAGE 1.4"
          rationale: >
            MANAGE 1.4 requires negative residual risks to be documented -
            the explicit residual-risk-acceptance record Art 9(5) implies.
      owasp_llm:
        - ref: "LLM05"
          when: llm_based
          rationale: >
            Improper Output Handling (LLM05) mitigations (output validation,
            sandboxing downstream consumers) are concrete design-level risk
            reduction measures for LLM systems under Art 9(5)(a).

  - id: "art9.6-8"
    clause: "Art 9(6)-(8)"
    severity: high
    text: >
      Test the system to identify the most appropriate targeted risk
      management measures; test against prior-defined metrics and
      probabilistic thresholds appropriate to the intended purpose,
      throughout development and before placing on the market.
    evidence_keys: [testing_defined_metrics, pre_market_testing]
    mappings:
      iso42001:
        - ref: "A.6.2.4"
          rationale: >
            A.6.2.4 (verification and validation) is ISO 42001's testing
            control; Art 9(6)-(8) adds the requirement that metrics and
            probabilistic thresholds be defined *before* testing.
      nist_ai_rmf:
        - ref: "MEASURE 2.1"
          rationale: >
            MEASURE 2.1 requires test sets, metrics and details of the tools
            used during TEVV to be documented - the "prior defined metrics"
            of Art 9(8).
        - ref: "MEASURE 2.3"
          rationale: >
            MEASURE 2.3 requires system performance to be measured against
            deployment-context conditions, matching testing "appropriate to
            the intended purpose".
      owasp_llm:
        - ref: "LLM01"
          when: llm_based
          rationale: >
            For LLM systems, adversarial testing (prompt-injection red-teaming
            per LLM01) is part of the state-of-the-art testing Art 9 expects;
            purely accuracy-based test suites are not sufficient.

  - id: "art9.9"
    clause: "Art 9(9)"
    severity: medium
    text: >
      Give specific consideration to whether the system is likely to
      adversely impact persons under 18 or other vulnerable groups.
    evidence_keys: [vulnerable_groups_assessment]
    mappings:
      iso42001:
        - ref: "A.5.4"
          rationale: >
            A.5.4's impact assessment on individuals and groups is where
            vulnerable-group-specific analysis is documented in an AIMS.
      nist_ai_rmf:
        - ref: "MEASURE 2.11"
          rationale: >
            MEASURE 2.11 (fairness and bias evaluation) requires examining
            impacts across subgroups; minors and vulnerable groups are
            subgroup analyses this evaluation must include.
      owasp_llm: []
