# Fly.io deployment - single container, API service.
#   fly launch --copy-config --no-deploy   (first time; pick region/app name)
#   fly secrets set AIGOV_API_KEYS=sk-your-key
#   fly deploy
app = "aigov-api"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile"

[env]
  AIGOV_RATE_LIMIT = "60"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  method = "GET"
  path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
