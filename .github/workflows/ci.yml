name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev,api]"
      - name: Test
        run: pytest -q
      - name: End-to-end demo (audit + BOM must validate)
        run: |
          python -m aigov.cli audit examples/resume_screener.yaml --out out --date 2026-07-03
          python -m aigov.cli bom examples/resume_screener.yaml --out out
          python -m aigov.cli crosswalk --out out

  independent-bom-validation:
    # cross-implementation conformance: the CycloneDX JS library and a generic
    # SHACL engine validate what the Python pipeline generated
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Generate BOMs
        run: |
          pip install -e . pyshacl
          python -m aigov.cli bom examples/resume_screener.yaml --out out
      - name: CycloneDX - official JS implementation
        run: |
          cd tools && npm ci
          node validate_cdx_independent.mjs ../out/bom.cdx.json
      - name: SPDX - official SHACL model via pyshacl
        run: python tools/validate_spdx_shacl.py out/bom.spdx3.json

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t aigov:ci .
      - name: Boot and probe /health
        run: |
          docker run -d -p 8000:8000 --name aigov aigov:ci
          for i in $(seq 1 20); do
            if curl -sf http://localhost:8000/health; then exit 0; fi
            sleep 2
          done
          docker logs aigov
          exit 1
