name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev,api]"
      - name: Test
        run: pytest -q
      - name: End-to-end demo (audit + BOM must validate)
        run: |
          python -m aigov.cli audit examples/resume_screener.yaml --out out --date 2026-07-03
          python -m aigov.cli bom examples/resume_screener.yaml --out out
          python -m aigov.cli crosswalk --out out

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t aigov:ci .
      - name: Boot and probe /health
        run: |
          docker run -d -p 8000:8000 --name aigov aigov:ci
          for i in $(seq 1 20); do
            if curl -sf http://localhost:8000/health; then exit 0; fi
            sleep 2
          done
          docker logs aigov
          exit 1
